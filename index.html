<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HumanBodyDoc</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFF9F3;
  --card-bg:#FFFFFF;
  --text:#1a1a2e;
  --muted:#6b7280;
  --border:#e5e7eb;
  --shadow:0 4px 24px rgba(0,0,0,0.08);
  --radius:16px;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:0 2rem;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;padding:1rem 0}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FF6B6B,#FF8E53);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-text{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--text);font-weight:700}
.logo-text span{color:#FF6B6B}
.search-wrap{flex:1;position:relative;max-width:500px}
.search-wrap input{width:100%;padding:10px 16px 10px 42px;border:1.5px solid var(--border);border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;background:#f9fafb;transition:.2s}
.search-wrap input:focus{border-color:#FF6B6B;background:#fff}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);max-height:320px;overflow-y:auto;display:none;z-index:200}
.search-results.active{display:block}
.search-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s}
.search-item:hover{background:#f9fafb}
.search-item-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.search-item-name{font-weight:700;font-size:14px}
.search-item-sub{font-size:12px;color:var(--muted)}

/* SYSTEM TABS */
.system-tabs{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.system-tabs::-webkit-scrollbar{height:3px}
.system-tabs::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:3px}
.tabs-inner{max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;gap:4px;padding-top:8px;padding-bottom:0}
.tab-btn{
  padding:8px 18px;border:none;background:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  color:var(--muted);border-radius:10px 10px 0 0;transition:.2s;
  white-space:nowrap;border-bottom:3px solid transparent;
}
.tab-btn:hover{color:var(--text);background:#f9fafb}
.tab-btn.active{color:var(--text);border-bottom-color:currentColor}

/* MAIN */
main{max-width:1200px;margin:0 auto;padding:2rem}

/* SECTION HEADER */
.section-header{margin-bottom:1.5rem;display:flex;align-items:center;gap:12px}
.section-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700}
.section-badge{padding:4px 14px;border-radius:50px;font-size:12px;font-weight:800;letter-spacing:.5px}

/* ORGAN CARDS GRID */
.organs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}

/* ORGAN CARD */
.organ-card{
  background:var(--card-bg);border-radius:var(--radius);
  box-shadow:var(--shadow);cursor:pointer;
  transition:.25s;overflow:hidden;
  border:1.5px solid transparent;
}
.organ-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,0.13)}
.card-banner{height:130px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-banner img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.15));transition:.3s}
.organ-card:hover .card-banner img{transform:scale(1.1)}
.card-body{padding:14px 16px}
.card-name{font-weight:800;font-size:1rem;margin-bottom:4px}
.card-parts-count{font-size:12px;color:var(--muted);margin-bottom:8px}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}
.card-tag{padding:2px 8px;border-radius:50px;font-size:11px;font-weight:700}
.card-disease-count{margin-top:8px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.45);
  z-index:500;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:.3s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:#fff;border-radius:28px 28px 0 0;
  width:100%;max-width:760px;max-height:90vh;overflow-y:auto;
  transform:translateY(40px);transition:.3s;
  padding-bottom:2rem;
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:24px 28px 0;position:relative}
.modal-close{
  position:absolute;right:20px;top:20px;
  width:34px;height:34px;border-radius:50%;
  border:none;background:#f3f4f6;cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:.2s;
}
.modal-close:hover{background:#e5e7eb}
.modal-organ-header{display:flex;align-items:center;gap:16px;margin-bottom:1rem}
.modal-organ-img{width:70px;height:70px;object-fit:contain}
.modal-organ-name{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700}
.modal-organ-system{font-size:13px;font-weight:700;margin-top:2px}
.modal-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:1.2rem;padding:0 28px}

/* MODAL TABS */
.modal-tabs{display:flex;gap:0;padding:0 28px;border-bottom:1.5px solid var(--border);margin-bottom:1.2rem}
.modal-tab{padding:8px 20px;border:none;background:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-1.5px;transition:.2s}
.modal-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.modal-content{padding:0 28px}

/* ANATOMY SECTION */
.anatomy-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.2rem}
.anatomy-part{
  padding:6px 14px;border-radius:50px;
  font-size:13px;font-weight:700;cursor:default;
  transition:.2s;
}
.anatomy-img-row{display:flex;gap:12px;margin-bottom:1.2rem;overflow-x:auto}
.anatomy-img-card{flex:0 0 auto;width:140px;border-radius:12px;overflow:hidden;border:1.5px solid var(--border)}
.anatomy-img-card img{width:100%;height:100px;object-fit:cover}
.anatomy-img-card-label{padding:6px;font-size:11px;font-weight:700;text-align:center;background:#f9fafb;color:var(--muted)}

/* DISEASE TREE */
.disease-list{display:flex;flex-direction:column;gap:10px}
.disease-item{border:1.5px solid var(--border);border-radius:12px;overflow:hidden;transition:.2s}
.disease-item:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.disease-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;background:#fafafa}
.disease-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.disease-name{font-weight:800;font-size:14px;flex:1}
.disease-type-badge{padding:2px 10px;border-radius:50px;font-size:11px;font-weight:700}
.disease-arrow{font-size:12px;color:var(--muted);transition:.3s}
.disease-item.open .disease-arrow{transform:rotate(180deg)}
.disease-body{display:none;padding:12px 16px;background:#fff;border-top:1px solid var(--border)}
.disease-item.open .disease-body{display:block}
.disease-body-inner{display:flex;flex-direction:column;gap:10px}
.cure-section-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.cure-pills{display:flex;flex-wrap:wrap;gap:6px}
.cure-pill{padding:5px 12px;border-radius:50px;font-size:12px;font-weight:700;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.cure-pill.vaccine{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.cure-pill.surgery{background:#fef3c7;color:#92400e;border-color:#fde68a}
.cure-pill.lifestyle{background:#fdf4ff;color:#7e22ce;border-color:#e9d5ff}
.cure-pill.therapy{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.disease-symptoms{font-size:13px;color:var(--muted);line-height:1.6}

/* EMPTY STATE */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-state-emoji{font-size:3rem;margin-bottom:1rem}
.empty-state-text{font-size:1rem;font-weight:600}

/* FOOTER */
footer{text-align:center;padding:2rem;color:var(--muted);font-size:13px;border-top:1px solid var(--border);margin-top:2rem}

@media(max-width:640px){
  .organs-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .modal{max-height:95vh;border-radius:20px 20px 0 0}
  .modal-organ-name{font-size:1.3rem}
  .header-inner{flex-wrap:wrap;gap:0.8rem}
}
</style>
</head>

      <div id="panelDiseases" style="display:none"></div>
    </div>
  </div>
</div>

<footer>
  HumanBodyDoc &mdash; Open-source human body reference &nbsp;|&nbsp; <a href="https://github.com/A-tavv/humanbody-doc" style="color:inherit">GitHub</a>

let activeSystem = 'all';
let currentOrgan = null;
let activeTab = 'anatomy';

function getSystem(id){ return SYSTEMS[id] || SYSTEMS.all; }

function buildTabs(){
  const container = document.getElementById('systemTabs');
  container.innerHTML = Object.entries(SYSTEMS).map(([key,s])=>
    `<button class="tab-btn${key===activeSystem?' active':''}" data-system="${key}" 
     style="color:${key===activeSystem?s.color:'var(--muted)'};border-bottom-color:${key===activeSystem?s.color:'transparent'}"
     onclick="setSystem('${key}')">
      <span style="font-size:14px">${s.icon}</span> ${s.name}
     </button>`
  ).join('');
}

function setSystem(key){
  activeSystem = key;
  buildTabs();
  renderOrgans();
}

function renderOrgans(){
  const sys = getSystem(activeSystem);
  const header = document.getElementById('sectionHeader');
  const grid = document.getElementById('organsGrid');
  const organs = activeSystem==='all' ? DATA : DATA.filter(o=>o.system===activeSystem);
  
  header.innerHTML = `
    <div class="section-title" style="color:${sys.color}">${sys.icon} ${sys.name==='All Systems'?'All Organs':sys.name}</div>
    <span class="section-badge" style="background:${sys.bg};color:${sys.color}">${organs.length} organs</span>
  `;

  if(organs.length===0){
    grid.innerHTML=`<div class="empty-state"><div class="empty-state-emoji">&#128269;</div><div class="empty-state-text">No organs in this system yet. Coming soon!</div></div>`;
    return;
  }

  grid.innerHTML = organs.map(organ=>{
    const s = getSystem(organ.system);
    return `
    <div class="organ-card" onclick="openOrgan('${organ.id}')" style="border-color:${s.color}22">
      <div class="card-banner" style="background:linear-gradient(135deg,${s.bg},${s.color}22)">
        <img src="${organ.img}" alt="${organ.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy">
        <div style="display:none;width:80px;height:80px;background:${s.bg};border-radius:50%;align-items:center;justify-content:center;font-size:2.5rem">${s.icon}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${organ.name}</div>
        <div class="card-parts-count" style="color:${s.color}">${organ.parts.length} anatomical parts</div>
        <div class="card-tags">
          ${organ.parts.slice(0,3).map(p=>`<span class="card-tag" style="background:${s.bg};color:${s.color}">${p}</span>`).join('')}
          ${organ.parts.length>3?`<span class="card-tag" style="background:#f3f4f6;color:#6b7280">+${organ.parts.length-3}</span>`:''}
        </div>
        <div class="card-disease-count" style="color:${s.color}">&#9889; ${organ.diseases.length} tracked diseases</div>
      </div>
    </div>`;
  }).join('');
}

function openOrgan(id){
  currentOrgan = DATA.find(o=>o.id===id);
  if(!currentOrgan) return;
  const sys = getSystem(currentOrgan.system);
  document.getElementById('modalImg').src = currentOrgan.img;
  document.getElementById('modalImg').onerror = function(){this.style.display='none'};
  document.getElementById('modalName').textContent = currentOrgan.name;
  document.getElementById('modalSystem').innerHTML = `<span style="color:${sys.color};font-weight:800">${sys.icon} ${sys.name} System</span>`;
  document.getElementById('modalDesc').textContent = currentOrgan.desc;
  document.getElementById('modal').style.setProperty('--accent', sys.color);
  switchTab('anatomy');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}

function switchTab(tab){
  activeTab = tab;
  const sys = getSystem(currentOrgan?.system||'all');
  document.getElementById('tabAnatomy').className = 'modal-tab'+(tab==='anatomy'?' active':'');
  document.getElementById('tabDiseases').className = 'modal-tab'+(tab==='diseases'?' active':'');
  document.getElementById('panelAnatomy').style.display = tab==='anatomy'?'':'none';
  document.getElementById('panelDiseases').style.display = tab==='diseases'?'':'none';
  if(tab==='anatomy') renderAnatomy();
  else renderDiseases();
}

function renderAnatomy(){
  if(!currentOrgan) return;
  const sys = getSystem(currentOrgan.system);
  document.getElementById('panelAnatomy').innerHTML = `
    <h3 style="font-size:14px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">Anatomical Parts</h3>
    <div class="anatomy-grid">
      ${currentOrgan.parts.map((p,i)=>
        `<span class="anatomy-part" style="background:${sys.bg};color:${sys.color};border:1.5px solid ${sys.color}33">${p}</span>`
      ).join('')}
    </div>
    <p style="font-size:13px;color:var(--muted);line-height:1.7;margin-top:1rem">${currentOrgan.desc}</p>
  `;
}

function renderDiseases(){
  if(!currentOrgan) return;
  const sys = getSystem(currentOrgan.system);
  const html = currentOrgan.diseases.map((d,i)=>{
    const cures = d.cures;
    const sections = Object.entries(cures).map(([type,items])=>{
      const label = {medication:'&#128138; Medications',vaccine:'&#128137; Vaccines',surgery:'&#128295; Surgery / Procedures',therapy:'&#129333; Therapy',lifestyle:'&#127808; Lifestyle'}[type]||type;
      const cls = {medication:'',vaccine:'vaccine',surgery:'surgery',therapy:'therapy',lifestyle:'lifestyle'}[type]||'';
      return `<div style="margin-bottom:10px">
        <div class="cure-section-title">${label}</div>
        <div class="cure-pills">${items.map(c=>`<span class="cure-pill ${cls}">${c}</span>`).join('')}</div>
      </div>`;
    }).join('');
    const typeColor = {Acute:'#DC2626',Chronic:'#D97706',Infection:'#2563EB','Viral Infection':'#2563EB',Malignant:'#7C3AED',Autoimmune:'#DB2777',Degenerative:'#6B7280',Inflammatory:'#EA580C',Neurological:'#7C3AED',Neurodegenerative:'#7C3AED',Pressure:'#059669',Structural:'#65A30D',Vascular:'#DC2626',Traumatic:'#D97706',Endocrine:'#DB2777',Metabolic:'#D97706',Functional:'#2563EB',Arrhythmia:'#DC2626',Mucosal:'#EA580C'}[d.type]||sys.color;
    return `
    <div class="disease-item" id="dis-${i}">
      <div class="disease-header" onclick="toggleDisease(${i})">
        <div class="disease-icon" style="background:${typeColor}18;font-size:18px">${d.emoji}</div>
        <div class="disease-name">${d.name}</div>
        <span class="disease-type-badge" style="background:${typeColor}15;color:${typeColor}">${d.type}</span>
        <span class="disease-arrow">&#9660;</span>
      </div>
      <div class="disease-body">
        <div class="disease-body-inner">
          ${d.symptoms?`<div><div class="cure-section-title">&#129298; Symptoms</div><div class="disease-symptoms">${d.symptoms}</div></div>`:''}
          ${sections}
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('panelDiseases').innerHTML = `<div class="disease-list">${html}</div>`;
}

function toggleDisease(i){
  const el = document.getElementById('dis-'+i);
  el.classList.toggle('open');
}

// SEARCH
function buildSearchIndex(){
  const index = [];
  DATA.forEach(organ=>{
    const sys = getSystem(organ.system);
    index.push({type:'organ',name:organ.name,sub:sys.name+' System',color:sys.color,organId:organ.id});
    organ.diseases.forEach(d=>{
      index.push({type:'disease',name:d.name,sub:'in '+organ.name,color:'#DC2626',organId:organ.id});
    });
    organ.parts.forEach(p=>{
      index.push({type:'part',name:p,sub:'Part of '+organ.name,color:'#6B7280',organId:organ.id});
    });
  });
  return index;
}

const searchIndex = buildSearchIndex();
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input',()=>{
  const q = searchInput.value.trim().toLowerCase();
  if(q.length<2){searchResults.classList.remove('active');return;}
  const results = searchIndex.filter(item=>item.name.toLowerCase().includes(q)).slice(0,10);
  if(!results.length){searchResults.classList.remove('active');return;}
  searchResults.innerHTML = results.map(r=>`
    <div class="search-item" onclick="handleSearchClick('${r.organId}')">
      <div class="search-item-dot" style="background:${r.color}"></div>
      <div>
        <div class="search-item-name">${r.name}</div>
        <div class="search-item-sub">${r.sub}</div>
      </div>
    </div>`).join('');
  searchResults.classList.add('active');
});

function handleSearchClick(organId){
  searchResults.classList.remove('active');
  searchInput.value='';
  openOrgan(organId);
}

document.addEventListener('click',e=>{
  if(!searchInput.contains(e.target)&&!searchResults.contains(e.target)) searchResults.classList.remove('active');
});

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalOverlay').onclick = e=>{ if(e.target===document.getElementById('modalOverlay')) closeModal(); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

buildTabs();
renderOrgans();
</script>
